[pytest]
log_cli = true
log_cli_level = INFO
testpaths = tests
python_files = test_*.py
addopts =
    -ra
    --alluredir=allure-results
markers =
    smoke: fast subset for CI on push/PR
    regression: full suite, nightly
    api: api related tests
    performance: api performance tests
    slow: tests with significant built-in wait time